# Local infrastructure for PayGuard.
# Reads variables from the .env file in this folder.
# Services run on the host (./mvnw spring-boot:run) and connect to these.
#
# For user-service you only need Postgres:  docker compose up -d postgres
# Bring up everything later:                docker compose up -d
services:
  postgres:
    image: postgres:16
    container_name: payguard-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-payguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payguard}
      POSTGRES_DB: payguard          # bootstrap db; per-service DBs created by init script
    ports:
      - "5432:5432"
    volumes:
      - ./infra/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payguard}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: payguard-redis
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:3.9.0        # official Apache image, KRaft mode (no ZooKeeper)
    container_name: payguard-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  mailpit:
    image: axllent/mailpit:latest
    container_name: payguard-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # web UI

volumes:
  pgdata:
