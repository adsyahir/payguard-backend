dotenv:
  directory: ../..          # load the shared .env at payguard-backend/ root (run from this service folder)

spring:
  application:
    name: user-service       # = config filename = eureka id
  config:
    # no 'optional:' — if config-server is down, fail loudly instead of starting
    # with no datasource url and a confusing "url attribute is not specified" error
    import: configserver:${CONFIG_SERVER_URI:http://localhost:8888}
